name: Deploy Muse Recorder to GitHub Pages

# Deploys on every push to main. The app now lives at the repo ROOT and is
# published to GitHub Pages, so the URL is https://<you>.github.io/<repo>/ .
#
# Build-time step: the service-worker cache name is stamped with the commit SHA
# so every deploy busts caches automatically.
#
# One-time setup in the repo:
#   Settings > Pages > Build and deployment > Source: GitHub Actions
# config.js is committed in the repo (the token is public on the served site
# anyway), so there is no secret-injection step.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp service-worker cache version with commit SHA
        run: |
          sed -i "s|muse-recorder-v[A-Za-z0-9._-]*|muse-recorder-${GITHUB_SHA}|" sw.js
          grep "const CACHE" sw.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Publish only the app shell, not cloud/ (Apps Script) or test/ tooling.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r index.html manifest.webmanifest sw.js .nojekyll css js icons _site/
      - name: Upload site artifact (_site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
